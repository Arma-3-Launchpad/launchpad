# When a GitHub release is published (not draft), mirror its notes to a public Gist.
# Requires a PAT with `gist` scope (GITHUB_TOKEN cannot create or update gists).
# Optional: set repo secret RELEASE_NOTES_GIST_ID after the first run creates the gist,
# so all versions accumulate in one Gist; otherwise each run creates a new Gist.

name: Publish release notes to Gist

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  gist:
    name: Sync release notes to Gist
    runs-on: ubuntu-latest
    steps:
      - name: Push notes to GitHub Gist
        uses: actions/github-script@v9
        env:
          GIST_TOKEN: ${{ secrets.GIST_RELEASE_TOKEN }}
          GIST_ID: ${{ secrets.RELEASE_NOTES_GIST_ID }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const gistToken = process.env.GIST_TOKEN;
            const existingGistId = process.env.GIST_ID || '';

            if (!gistToken) {
              core.setFailed('Missing repo secret GIST_RELEASE_TOKEN (PAT with **gist** scope). GITHUB_TOKEN cannot manage gists.');
              return;
            }

            const rel = context.payload.release;
            const tag = rel.tag_name || 'unknown';
            const title = rel.name || tag;
            const body = (rel.body && rel.body.trim()) ? rel.body : '_No release notes were provided._';
            const releaseUrl = rel.html_url;
            const publishedAt = rel.published_at || new Date().toISOString();

            const fileForTag = `${tag.replace(/[^a-zA-Z0-9._-]/g, '-')}.md`;
            const markdown = [
              `# ${title}`,
              '',
              `- **Tag:** \`${tag}\``,
              `- **Published:** ${publishedAt}`,
              `- **GitHub release:** ${releaseUrl}`,
              '',
              '---',
              '',
              body,
              ''
            ].join('\n');

            const gistClient = getOctokit(gistToken);

            if (existingGistId) {
              const { data } = await gistClient.rest.gists.update({
                gist_id: existingGistId,
                description: `A3 Mission Launchpad release notes (latest: ${tag})`,
                files: {
                  'latest.md': { content: markdown },
                  [fileForTag]: { content: markdown }
                }
              });
              const owner = data.owner.login;
              const url = `https://gist.github.com/${owner}/${data.id}#file-latest-md`;
              core.summary.addHeading('Release notes on Gist', 2);
              core.summary.addRaw(`**Latest (readable):** ${url}\n`, true);
              core.summary.addRaw(`**This version file:** \`${fileForTag}\` in the same Gist.`, true);
              core.summary.write();
              core.notice(`Release notes updated: ${url}`);
            } else {
              const { data } = await gistClient.rest.gists.create({
                description: `A3 Mission Launchpad release notes (latest: ${tag})`,
                public: true,
                files: {
                  'latest.md': { content: markdown },
                  [fileForTag]: { content: markdown }
                }
              });
              const url = `https://gist.github.com/${data.owner.login}/${data.id}#file-latest-md`;
              core.summary.addHeading('Release notes on Gist', 2);
              core.summary.addRaw(`**Latest (readable):** ${url}\n`, true);
              core.summary.addRaw(
                `Add repo secret **RELEASE_NOTES_GIST_ID** = \`${data.id}\` so future releases append to this Gist instead of creating new ones.`,
                true
              );
              core.summary.write();
              core.notice(`Release notes published: ${url}`);
              core.warning('Set RELEASE_NOTES_GIST_ID to this gist id to reuse one public page for all releases.');
            }
